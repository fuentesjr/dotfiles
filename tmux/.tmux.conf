
# ==============================================================================
# General Settings
# ==============================================================================

# Prefix key
unbind C-b
set-option -g prefix C-Space
bind-key Tab last-window

# Terminal
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -g default-shell $SHELL

# Behavior
set -s escape-time 0
set -s set-clipboard on
set -g mouse on
set -g history-limit 100000
set -g focus-events on
set -g monitor-activity on
set -g visual-activity on
set -g visual-bell off
set -g bell-action none
set-option -g renumber-windows on
setw -g aggressive-resize off
set-option -g allow-rename off
set -g display-panes-time 1200
set -g message-style 'fg=#f8f8f2,bg=#44475a'
set -g message-command-style 'fg=#282a36,bg=#8be9fd'

# Start window and pane numbering at 0
set -g base-index 0
setw -g pane-base-index 0

# ==============================================================================
# Key Bindings
# ==============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded."

# New windows and splits inherit current path
bind c new-window -c '#{pane_current_path}'
bind \\ split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Navigation model:
#   Ctrl-h/j/k/l  -> shared Neovim/tmux navigation via vim-tmux-navigator
#   Alt-Arrow     -> tmux-only pane movement
#   Alt-h/j/k/l   -> pane resizing via better-vim-tmux-resizer

# No-prefix pane navigation, leaving Alt-h/j/k/l available for resizing.
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R

# Faster pane and window management.
bind z resize-pane -Z
bind > swap-pane -D
bind < swap-pane -U
bind ! break-pane -d
bind J choose-tree -Zs
bind W choose-tree -Zw
bind m select-layout main-vertical
bind M select-layout main-horizontal
bind Space next-layout

# Vi copy mode
setw -g mode-keys vi
setw -g mode-style 'fg=#282a36,bg=#8be9fd'
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel
bind / copy-mode \; send -X search-forward
bind ? copy-mode \; send -X search-backward

# Safer destructive actions.
bind-key x confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind-key & confirm-before -p "Kill window #W? (y/n)" kill-window
bind-key R confirm-before -p "Respawn pane #P? (y/n)" respawn-pane -k

# Pane resizing handled by better-vim-tmux-resizer plugin:
#   Alt-h: resize left
#   Alt-j: resize down
#   Alt-k: resize up
#   Alt-l: resize right

# ==============================================================================
# Plugins
# ==============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'dracula/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'RyanMillerC/better-vim-tmux-resizer'
set -g @plugin 'fcsonline/tmux-thumbs'

# ==============================================================================
# Plugin Configuration
# ==============================================================================

# Dracula theme
set -g @dracula-show-powerline true
set -g @dracula-plugins "time"
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g @dracula-time-format "%m/%d %H:%M %Z"
set -g status-position bottom

# Thumbs
set -g @thumbs-command "printf '%s' '{}' | tmux load-buffer -w -"

# ==============================================================================
# TPM Bootstrap
# ==============================================================================

setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"

# Install TPM manually once:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then use prefix + I inside tmux to install plugins.
if "test -d ~/.tmux/plugins/tpm" \
       "run '~/.tmux/plugins/tpm/tpm'"

# Keep a visible prefix indicator and lightweight context in the status bar.
set -g status-style 'bg=#1f2330,fg=#f8f8f2'
set -g status-justify left
set -g status-left-style default
set -g status-right-style default
set -g status-interval 5
set -g status-left-length 40
set -g status-left '#(sh -c '\''count=$(tmux list-sessions 2>/dev/null | wc -l | tr -d " "); if [ "${count:-0}" -gt 1 ]; then printf "#[fg=#1f2330,bg=#8be9fd,bold] #S #[fg=#8be9fd,bg=#282a36,nobold]"; fi'\'')#[default]#{?client_prefix, #[fg=#f1fa8c,bold]PREFIX#[default],}'
set -g status-right-length 100
set -g status-right '#[fg=#6272a4]#{pane_current_command} #[fg=#44475a]| #[fg=#c0c5d9]#W #[fg=#44475a]| #[fg=#f1fa8c]%m/%d %I:%M %p'
set -g window-status-separator ' '
set -g window-status-style 'fg=#6272a4,bg=#1f2330'
set -g window-status-format '#[fg=#6272a4] #I #[fg=#c0c5d9]#W#{?window_zoomed_flag, [Z],}#{?window_activity_flag, [*],}#{?window_bell_flag, [!],} '
set -g window-status-current-style 'fg=#1f2330,bg=#8be9fd'
set -g window-status-current-format '#[fg=#1f2330,bg=#8be9fd,bold] #I #W#{?window_zoomed_flag, [Z],}#{?window_activity_flag, [*],} #[fg=#8be9fd,bg=#1f2330,nobold]'
set -g window-status-activity-style 'fg=#282a36,bg=#f1fa8c,bold'
set -g window-status-bell-style 'fg=#282a36,bg=#ff5555,bold'
set -g mode-style 'fg=#282a36,bg=#8be9fd,bold'
set -g display-panes-colour '#6272a4'
set -g display-panes-active-colour '#ff79c6'
set -g clock-mode-colour '#8be9fd'

# Make the focused pane stand out from inactive panes.
set -g window-style 'bg=#14151b'
set -g window-active-style 'bg=#20222b'
set -g pane-border-style 'fg=#44475a'
set -g pane-active-border-style 'fg=#ff79c6'
set -g pane-border-indicators both
set -g pane-border-status top
set -g pane-border-lines heavy
set -g pane-border-format '#[fg=#ff79c6,bold]#{?pane_active,ACTIVE ,}#[fg=#6272a4]| #[fg=#f8f8f2]#P #[fg=#6272a4]| #[fg=#8be9fd]#{b:pane_current_path} #[fg=#6272a4]| #[fg=#f8f8f2]#{pane_current_command}#[fg=#f1fa8c]#{?pane_in_mode, [COPY],}'
